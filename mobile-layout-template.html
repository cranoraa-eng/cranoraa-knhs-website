<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mobile Base Layout</title>
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --col-count: 4;
      --margin-x: 16px;
      --gutter: 16px;
      --top-bar: 56px;
      --bottom-bar: 56px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f1f5f9;
      /* prevent any body scroll — only <main> scrolls */
      height: 100dvh;
      overflow: hidden;
    }

    /* ── Top App Bar ── */
    header {
      position: sticky;
      top: 0;
      z-index: 50;
      height: calc(var(--top-bar) + var(--safe-top));
      padding-top: var(--safe-top);
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: #1e293b;
    }

    /* ── Main Scrollable Grid ── */
    main {
      height: calc(100dvh - var(--top-bar) - var(--safe-top) - var(--bottom-bar) - var(--safe-bottom));
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;

      /* 4-column stretch grid with 16px margins and 16px gutters */
      display: grid;
      grid-template-columns: repeat(var(--col-count), 1fr);
      gap: var(--gutter);
      padding: var(--margin-x);
      align-content: start;
    }

    /* ── Bottom Tab Bar ── */
    nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      height: calc(var(--bottom-bar) + var(--safe-bottom));
      padding-bottom: var(--safe-bottom);
      background: #ffffff;
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      justify-content: space-around;
    }
    nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      font-size: 10px;
      font-weight: 600;
      color: #94a3b8;
    }
    nav a.active { color: #7c3aed; }
    nav a .icon { width: 24px; height: 24px; }

    /* ── Demo Cards ── */
    .card {
      background: #ffffff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 0.875rem;
      color: #475569;
    }

    /* Span variants */
    .span-2 { grid-column: span 2; }
    .span-4 { grid-column: span 4; }

    /* ── Grid verification overlays (remove in production) ── */
    .grid-debug {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      display: grid;
      grid-template-columns: repeat(var(--col-count), 1fr);
      gap: var(--gutter);
      padding: var(--margin-x);
      margin-top: calc(var(--top-bar) + var(--safe-top));
      height: calc(100dvh - var(--top-bar) - var(--safe-top) - var(--bottom-bar) - var(--safe-bottom));
    }
    .grid-debug > div {
      background: rgba(124, 58, 237, .06);
      border: 1px dashed rgba(124, 58, 237, .2);
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <!-- Top App Bar -->
  <header>School Portal</header>

  <!-- Scrollable Content Grid -->
  <main>
    <!-- 4-column span -->
    <div class="card span-4">Full Width Card (span 4)</div>

    <!-- 2-column span -->
    <div class="card span-2">Half Card (span 2)</div>
    <div class="card span-2">Half Card (span 2)</div>

    <!-- 1-column span (4 × 1fr = full row) -->
    <div class="card">1 col</div>
    <div class="card">1 col</div>
    <div class="card">1 col</div>
    <div class="card">1 col</div>

    <!-- Mixed spans -->
    <div class="card span-2">Half Card</div>
    <div class="card">1 col</div>
    <div class="card">1 col</div>

    <div class="card span-4">Full Width Card</div>

    <div class="card">1 col</div>
    <div class="card span-2">Half Card</div>
    <div class="card">1 col</div>
  </main>

  <!-- Bottom Tab Bar -->
  <nav>
    <a href="#" class="active">

      Home
    </a>
    <a href="#">
      <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
      News
    </a>
    <a href="#">
      <svg class="icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>

</body>
</html>
