services:
  - type: web
    name: knhs-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn school_portal.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: knhs-database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: knhs-backend.onrender.com,localhost,127.0.0.1
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: knhs-database
    databaseName: knhs_portal
    user: knhs_user
