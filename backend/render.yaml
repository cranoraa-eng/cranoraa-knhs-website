services:
  - type: web
    name: knhs-backend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn school_portal.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: cranoraa-knhs-website-1.onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://cranoraa-eng-cranoraa-knhs-website.vercel.app,http://localhost:5173,http://127.0.0.1:5173
      - key: CSRF_TRUSTED_ORIGINS
        value: https://cranoraa-eng-cranoraa-knhs-website.vercel.app,http://localhost:5173,http://127.0.0.1:5173
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
