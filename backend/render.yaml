services:
  - type: redis
    name: knhs-redis
    ipAllowList: []  # Only accessible from other Render services
    plan: free
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: knhs-backend
    env: python
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT school_portal.asgi:application
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: REDIS_URL
        fromService:
          name: knhs-redis
          type: redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: cranoraa-knhs-website-1.onrender.com,localhost,127.0.0.1
      - key: CORS_ALLOWED_ORIGINS
        value: https://cranoraa-eng-cranoraa-knhs-website.vercel.app,http://localhost:5173,http://127.0.0.1:5173
      - key: CSRF_TRUSTED_ORIGINS
        value: https://cranoraa-eng-cranoraa-knhs-website.vercel.app,http://localhost:5173,http://127.0.0.1:5173
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: school_portal.settings
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: profile-pictures
      - key: MAILJET_API_KEY
        sync: false
      - key: MAILJET_SECRET_KEY
        sync: false
      - key: MAILJET_SENDER_EMAIL
        value: noreply@kiwalan-nhs.edu.ph
