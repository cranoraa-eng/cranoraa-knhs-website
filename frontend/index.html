<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / App Meta -->
    <meta name="theme-color" content="#1A0B2E" />
    <meta name="application-name" content="KNHS Portal" />
    <meta name="description" content="Kiwalan National High School — student, teacher, and admin portal." />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="KNHS Portal" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Android / Chrome PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>KNHS Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Global error handlers for debugging
      window.onerror = function(msg, url, line, col, error) {
        console.error('GLOBAL ERROR:', msg, 'at', url, ':', line, ':', col, error);
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error('UNHANDLED REJECTION:', event.reason);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
