<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="description" content="Kiwalan National High School — student, teacher, and admin portal." />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>KNHS Portal</title>
    
    <!-- Buffer polyfill must load BEFORE any other scripts -->
    <script>
      // Minimal Buffer polyfill for xlsx-populate
      window.Buffer = window.Buffer || {
        from: function(data, encoding) {
          if (typeof data === 'string') {
            return new TextEncoder().encode(data);
          }
          return new Uint8Array(data);
        },
        isBuffer: function(obj) {
          return obj instanceof Uint8Array;
        },
        alloc: function(size) {
          return new Uint8Array(size);
        },
        allocUnsafe: function(size) {
          return new Uint8Array(size);
        }
      };
      
      // Process polyfill for Node.js compatibility
      window.process = window.process || {
        env: {},
        version: '',
        versions: {},
        platform: 'browser',
        browser: true,
        nextTick: function(fn) { setTimeout(fn, 0); }
      };
      
      // Set global for Node.js compatibility
      window.global = window.globalThis = window;
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Global error handlers for debugging
      window.onerror = function(msg, url, line, col, error) {
        console.error('GLOBAL ERROR:', msg, 'at', url, ':', line, ':', col, error);
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error('UNHANDLED REJECTION:', event.reason);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
