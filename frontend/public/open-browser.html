<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening in browser…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1A0B2E;
      font-family: Inter, system-ui, sans-serif;
      color: #fff;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #9333ea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 14px; opacity: 0.7; margin: 0; }
    a {
      margin-top: 8px;
      font-size: 13px;
      color: #c4b5fd;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Opening in browser…</p>
  <a id="fallback" href="https://cranoraa-eng-cranoraa-knhs-website.vercel.app/">
    Tap here if it doesn't open
  </a>
  <script>
    // Read the destination from the ?url= query param
    const params = new URLSearchParams(location.search);
    const dest = params.get('url') || 'https://cranoraa-eng-cranoraa-knhs-website.vercel.app/';

    document.getElementById('fallback').href = dest;

    // Redirect immediately — because this is a plain HTML file (not a SPA route)
    // the browser handles it natively, breaking out of the PWA shell on Android.
    location.replace(dest);
  </script>
</body>
</html>
