<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening in browser…</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1A0B2E;
      font-family: Inter, system-ui, sans-serif;
      color: #fff;
      gap: 16px;
      text-align: center;
      padding: 24px;
      box-sizing: border-box;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,0.12);
      border-top-color: #9333ea;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 15px; opacity: 0.75; margin: 0; }
    .sub { font-size: 12px; opacity: 0.45; margin-top: 4px; }
    .btn {
      margin-top: 20px;
      display: inline-block;
      background: rgba(147,51,234,0.25);
      border: 1px solid rgba(147,51,234,0.5);
      color: #c4b5fd;
      font-size: 13px;
      font-weight: 700;
      padding: 10px 24px;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p>Opening in browser…</p>
  <p class="sub">This may take a moment on Android.</p>
  <a id="btn" class="btn" href="#">Open in Chrome</a>

  <script>
    const SITE = 'https://cranoraa-eng-cranoraa-knhs-website.vercel.app/';

    const btn = document.getElementById('btn');

    // Android Chrome intent URL — forces the URL to open in Chrome browser,
    // bypassing the installed PWA entirely.
    // Format: intent://<host><path>#Intent;scheme=https;package=com.android.chrome;end
    const intentUrl =
      'intent://cranoraa-eng-cranoraa-knhs-website.vercel.app/' +
      '#Intent;scheme=https;package=com.android.chrome;' +
      'S.browser_fallback_url=' + encodeURIComponent(SITE) + ';end';

    // Detect Android
    const isAndroid = /android/i.test(navigator.userAgent);

    if (isAndroid) {
      btn.href = intentUrl;
      // Auto-trigger on Android
      window.location.href = intentUrl;
    } else {
      // Desktop / iOS — window.open works fine outside PWA context here
      btn.href = SITE;
      btn.target = '_blank';
      window.open(SITE, '_blank', 'noopener,noreferrer');
    }
  </script>
</body>
</html>
