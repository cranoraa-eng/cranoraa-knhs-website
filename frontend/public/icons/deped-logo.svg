<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- White circle background -->
  <circle cx="100" cy="100" r="98" fill="white" stroke="#1a1a8c" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#1a1a8c" stroke-width="1.5"/>

  <!-- Outer text: KAGAWARAN NG EDUKASYON (top arc) -->
  <path id="topArc" d="M 15,100 A 85,85 0 0,1 185,100" fill="none"/>
  <text font-family="Arial,sans-serif" font-weight="900" font-size="13.5" fill="#1a1a8c" letter-spacing="1.5">
    <textPath href="#topArc" startOffset="3%">• KAGAWARAN NG EDUKASYON •</textPath>
  </text>

  <!-- Bottom text: REPUBLIKA NG PILIPINAS -->
  <path id="botArc" d="M 20,108 A 82,82 0 0,0 180,108" fill="none"/>
  <text font-family="Arial,sans-serif" font-weight="900" font-size="12" fill="#1a1a8c" letter-spacing="1">
    <textPath href="#botArc" startOffset="8%">REPUBLIKA NG PILIPINAS</textPath>
  </text>

  <!-- Shield / Coat of Arms background -->
  <path d="M100,145 L65,130 L65,78 Q65,72 71,70 L100,62 L129,70 Q135,72 135,78 L135,130 Z" fill="#1a1a8c"/>
  <!-- Shield border -->
  <path d="M100,147 L63,131 L63,77 Q63,68 71,66 L100,58 L129,66 Q137,68 137,77 L137,131 Z" fill="none" stroke="#888" stroke-width="1.5"/>

  <!-- Philippines map silhouette (simplified) -->
  <g fill="#e8a020" opacity="0.9">
    <!-- Luzon simplified -->
    <ellipse cx="95" cy="84" rx="10" ry="14" transform="rotate(-10 95 84)"/>
    <!-- Visayas simplified -->
    <ellipse cx="102" cy="100" rx="7" ry="5" transform="rotate(5 102 100)"/>
    <!-- Mindanao simplified -->
    <ellipse cx="105" cy="115" rx="11" ry="8" transform="rotate(-5 105 115)"/>
  </g>

  <!-- Sunrays from torch -->
  <g stroke="#e8a020" stroke-width="0.8" opacity="0.7">
    <line x1="100" y1="103" x2="70" y2="70"/>
    <line x1="100" y1="103" x2="75" y2="67"/>
    <line x1="100" y1="103" x2="80" y2="65"/>
    <line x1="100" y1="103" x2="86" y2="64"/>
    <line x1="100" y1="103" x2="93" y2="63"/>
    <line x1="100" y1="103" x2="100" y2="63"/>
    <line x1="100" y1="103" x2="107" y2="63"/>
    <line x1="100" y1="103" x2="114" y2="64"/>
    <line x1="100" y1="103" x2="120" y2="65"/>
    <line x1="100" y1="103" x2="125" y2="67"/>
    <line x1="100" y1="103" x2="130" y2="70"/>
    <line x1="100" y1="103" x2="135" y2="73"/>
    <line x1="100" y1="103" x2="65" y2="73"/>
  </g>

  <!-- Torch body -->
  <polygon points="100,143 94,115 97,110 100,108 103,110 106,115" fill="#c0c0c0" stroke="#999" stroke-width="0.5"/>
  <!-- Torch cup -->
  <ellipse cx="100" cy="108" rx="6" ry="3" fill="#b0b0b0"/>
  <!-- Flame -->
  <path d="M100,108 Q93,100 96,90 Q100,95 100,88 Q104,95 107,90 Q110,100 100,108Z" fill="#cc2200"/>
  <path d="M100,105 Q96,99 98,93 Q100,97 100,92 Q102,97 103,93 Q105,99 100,105Z" fill="#ff6600"/>
  <path d="M100,103 Q98,99 99,95 Q100,98 100,95 Q101,98 101,95 Q102,99 100,103Z" fill="#ffcc00"/>

  <!-- Rope / wreath at top of shield -->
  <path d="M72,70 Q100,60 128,70" fill="none" stroke="#1a1a8c" stroke-width="3" stroke-dasharray="4,2"/>

  <!-- Open book (top center, above shield) -->
  <g transform="translate(100,58)">
    <!-- Left page -->
    <path d="M0,0 L-12,-4 L-12,-14 L0,-10 Z" fill="white" stroke="#888" stroke-width="0.8"/>
    <!-- Right page -->
    <path d="M0,0 L12,-4 L12,-14 L0,-10 Z" fill="white" stroke="#888" stroke-width="0.8"/>
    <!-- Spine -->
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#888" stroke-width="1"/>
  </g>

  <!-- Left lion (simplified) -->
  <g transform="translate(74,54)" fill="#e8a020">
    <ellipse cx="-6" cy="0" rx="7" ry="5"/>
    <circle cx="-10" cy="-3" r="4"/>
    <path d="M-14,-5 L-18,-8 L-15,-9 L-12,-6Z"/>
  </g>
  <!-- Right lion (simplified) -->
  <g transform="translate(126,54)" fill="#e8a020">
    <ellipse cx="6" cy="0" rx="7" ry="5"/>
    <circle cx="10" cy="-3" r="4"/>
    <path d="M14,-5 L18,-8 L15,-9 L12,-6Z"/>
  </g>
</svg>
